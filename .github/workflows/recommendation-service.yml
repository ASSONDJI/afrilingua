name: Recommendation Service (Python)

on:
  push:
    branches: [main]
    paths:
      - 'services/recommendation-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/recommendation-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/recommendation-service/requirements.txt

      - name: Install dependencies
        working-directory: services/recommendation-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/recommendation-service
        run: pytest -v
