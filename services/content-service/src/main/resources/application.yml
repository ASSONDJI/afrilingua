server:
  port: 8083

spring:
  application:
    name: content-service

  datasource:
    url: jdbc:postgresql://localhost:5434/afrilingua_content
    username: afrilingua
    password: afrilingua_dev_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
application:
  storage:
    s3:
      endpoint: ${SUPABASE_S3_ENDPOINT}
      access-key: ${SUPABASE_S3_ACCESS_KEY}
      secret-key: ${SUPABASE_S3_SECRET_KEY}
      bucket: ${SUPABASE_S3_BUCKET}
      region: ${SUPABASE_S3_REGION}
