server:
  port: 8084

spring:
  application:
    name: lesson-service

  datasource:
    url: jdbc:postgresql://localhost:5435/afrilingua_lesson
    username: afrilingua
    password: afrilingua_dev_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
