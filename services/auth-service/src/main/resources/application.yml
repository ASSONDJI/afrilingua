server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/afrilingua_auth
    username: afrilingua
    password: afrilingua_dev_password

  jpa:
    hibernate:
      ddl-auto: validate   # Hibernate ne crée/modifie plus jamais le schéma — Flyway est seul responsable
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info


application:
  security:
    jwt:
      # Dev-only secret — MUST be overridden via env var in staging/production, never committed as real value
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B59}
      access-token-expiration-ms: 900000      # 15 minutes
      refresh-token-expiration-ms: 604800000  # 7 days



openapi:
  authService:
    base-path: /api/auth
